{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width:500px;">
    <div class="card p-4">

        <h3 class="text-center mb-3">Login</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                {{ form.username.label_tag }}
                {{ form.username }}
            </div>

            <div class="mb-3">
                {{ form.password.label_tag }}
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

        </form>

    </div>
</div>
{% endblock %}
