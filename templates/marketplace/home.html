{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <!-- Search -->
    <form method="GET" class="row g-2 mb-4">
        <div class="col-md-3">
            <input type="text" name="q" class="form-control" placeholder="Search...">
        </div>
        <div class="col-md-2">
            <input type="number" name="min_price" class="form-control" placeholder="Min Price">
        </div>
        <div class="col-md-2">
            <input type="number" name="max_price" class="form-control" placeholder="Max Price">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100">Filter</button>
        </div>
    </form>

    <div class="row g-4">
        {% for listing in listings %}
            <div class="col-md-4">
                <div class="card">

                    {% if listing.image %}
                        <img src="{{ listing.image.url }}" style="height:200px; width:100%; object-fit:cover;">
                    {% endif %}

                    <div class="p-3">
                        <h5>{{ listing.title }}</h5>
                        <p>€{{ listing.price }}</p>
                        <a href="{% url 'listing_detail' listing.id %}" class="btn btn-primary w-100">View</a>
                    </div>

                </div>
            </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
